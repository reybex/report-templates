<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <title>Etikett</title>
  <style>
    @page {
      size: 60mm 60mm;
      margin: 0;
    }

    html,
    body {
      width: 60mm;
      height: 60mm;
      margin: 0;
      padding: 0;
    }

    .label {
      width: 60mm;
      height: 60mm;
      background: #e6e6e6;
      padding: 3mm;
      box-sizing: border-box;
      position: relative;
      font-family: Arial, sans-serif;
    }

    .center {
      text-align: center;
    }

    /* Oberer Barcode */
    .barcode-img {
      width: 40mm;
      height: 10mm;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    /* Unterer Barcode */
    .barcode-img.bottom {
      width: 30mm;
      height: 8mm;
      display: block;
      margin: 0 auto;
    }

    .code-text {
      font-size: 8pt;
      margin-top: 1mm;
      text-align: center;
    }

    .right {
      position: absolute;
      right: 3mm;
      top: 16mm;
      font-size: 18pt;
      font-weight: bold;
    }

    .content {
      margin-top: 2mm;
      font-size: 9pt;
      line-height: 1.2;
    }

    .spacer {
      height: 2mm;
    }

    .bottom {
      position: absolute;
      bottom: 3mm;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="label">
    <!-- oberer Barcode -->
    <img src="https://barcode.tec-it.com/barcode.ashx?data=${doc_number}" class="barcode-img" />
    <!-- rechtes M -->
    <div class="right">M</div>
    <!-- Inhalt -->
    <div class="content">
      <div><strong>${sku}</strong></div>
      <div>${materialName}</div>
      <div class="spacer"></div>
      <div><strong>${quantity}</strong></div>
      <div class="spacer"></div>
      <div><strong>Kunde:</strong> ${relations_customer_name}</div>
    </div>
    <!-- unterer Barcode -->
    <div class="bottom">
      <img src="https://barcode.tec-it.com/barcode.ashx?data=${doc_number}" class="barcode-img bottom" />
    </div>
  </div>
</body>

</html>
